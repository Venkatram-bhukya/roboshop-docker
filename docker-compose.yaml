services:
  catalogue:
    build: ./catalogue
    image: bhukyadevops/catalogue:1.0.0
    container_name: catalogue
    depends_on:
    - mongodb
  mongodb:
    build: ./mongodb # it moves to mongodb directory
    image: bhukyadevops/mongodb:1.0.0 # docker build -tbhukyadevops /mongodb:1.0.0
    container_name: mongodb
  redis:
    image: redis:7.0
    container_name: redis
networks:
  default:
    driver: bridge
    name: roboshop
    external: false # if true, you need to create network manually