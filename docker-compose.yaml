services:
  catalogue:
    build: ./catalogue
    image: bhukyadevops/catalogue:1.0.0
    container_name: catalogue
    depends_on:
    - mongodb
  user:
    build: ./user
    image: bhukyadevops/user:1.0.0
    container_name: user
    depends_on:
    - redis
    - mongodb
      frontend:
    build: ./frontend
    image: bhukyadevops/frontend:1.0.0
    container_name: frontend
    depends_on:
    - catalogue
    - user
  mongodb:
    build: ./mongodb # it moves to mongodb directory
    image: bhukyadevops/mongodb:1.0.0 # docker build -t joindevops/mongodb:1.0.0
    container_name: mongodb
    volumes:
    - mongodb:/data/db
  redis:
    image: redis:7.0
    container_name: redis
